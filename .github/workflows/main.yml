name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Backend — ECR + App Runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/cv-tailor-backend:latest .
          docker push $REGISTRY/cv-tailor-backend:latest

      # App Runner auto-deploys when the ECR image is updated — no explicit trigger needed.
      # Amplify auto-deploys from GitHub on push to main — no explicit trigger needed.
